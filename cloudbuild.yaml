# builds docker image and deploys to cloud run
steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - northamerica-northeast2-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/shared-anime-lists/shared-anime-lists-git:$SHORT_SHA
      - -t
      - northamerica-northeast2-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/shared-anime-lists/shared-anime-lists-git:latest
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - northamerica-northeast2-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/shared-anime-lists/shared-anime-lists-git

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - services
      - update
      - shared-anime-lists-git
      - --platform=managed
      - --image=northamerica-northeast2-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/shared-anime-lists/shared-anime-lists-git:$SHORT_SHA
      - --region=northamerica-northeast2
      - --quiet

images:
  - northamerica-northeast2-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/shared-anime-lists/shared-anime-lists-git:$SHORT_SHA
